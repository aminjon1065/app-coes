# CoESCD — Local Development Infrastructure
# All infrastructure dependencies for local development.
# App services (api, realtime, workers, sfu, web) run via: pnpm run dev
#
# Core stack (default):
#   docker compose -f infra/docker/docker-compose.yml up -d
#
# With observability (Prometheus + Grafana + Jaeger):
#   docker compose -f infra/docker/docker-compose.yml --profile observability up -d
#
# Teardown with volumes:
#   docker compose -f infra/docker/docker-compose.yml down -v

services:

  # ── PostgreSQL 17 + PostGIS 3.5 ─────────────────────────────────────────────
  # system-design.md §6.1: PG 16→17 upgrade, PostGIS for geography types,
  # pg_stat_statements + pg_partman via shared_preload_libraries.
  # Extensions (uuid-ossp, pgcrypto, pg_trgm, btree_gist, pg_partman)
  # are installed by tools/migrations/init.sql on first start.
  # Extensions: uuid-ossp, pgcrypto, citext, postgis, pg_trgm, btree_gist, pg_stat_statements, pg_partman
  postgres:
    image: postgis/postgis:17-3.5
    container_name: coescd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: coescd_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"   # Direct access for DBeaver / psql admin only
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../tools/migrations/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ../../tools/migrations/iam/001_initial.sql:/docker-entrypoint-initdb.d/01_iam.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coescd_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    shm_size: "256mb"
    # pg_partman_bgw is NOT included in postgis/postgis image — loading it would
    # crash PostgreSQL on startup. Remove it from shared_preload_libraries.
    # pg_partman partition management runs on-demand via the app in dev.
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=1GB
      -c log_min_duration_statement=200
      -c log_timezone=UTC
      -c timezone=UTC

  # ── PgBouncer — connection pooler ───────────────────────────────────────────
  # system-design.md §6.2: "Database connections are managed via pgBouncer in
  # transaction mode." Apps MUST connect via pgBouncer (port 6432), not directly
  # to Postgres. Per-module pool caps are enforced here.
  # DATABASE_URL = postgresql://postgres:dev@localhost:6432/coescd_dev
  # Image: edoburu/pgbouncer (bitnami/pgbouncer does not exist on Docker Hub)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: coescd-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # edoburu/pgbouncer env var names (differ from bitnami)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: dev
      DB_NAME: coescd_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 600
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      # edoburu image listens on 5432 internally; we map to 6432 on the host
      LISTEN_PORT: 5432
    ports:
      - "6432:5432"   # All app services connect to localhost:6432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Redis 7.4 LTS ────────────────────────────────────────────────────────────
  # system-design.md §6.3: roles — PDP cache, session data, hot counters,
  # pub/sub for realtime fan-out and session revocation, presence (sorted sets),
  # rate limiting (token bucket).
  # Eviction: allkeys-lfu matches the documented cache eviction policy.
  # Note: dev uses a single Redis instance for all roles; prod uses separate
  # logical databases or dedicated instances per role.
  redis:
    image: redis:7.4-alpine
    container_name: coescd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lfu
      --loglevel notice
      --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  # ── NATS JetStream 2.10 ──────────────────────────────────────────────────────
  # eventing.md: durable streams, at-least-once delivery, DLQ, outbox relay.
  # Subjects: STREAM_IAM, STREAM_INCIDENT, STREAM_TASK, STREAM_CHAT, etc.
  nats:
    image: nats:2.10-alpine
    container_name: coescd-nats
    restart: unless-stopped
    # --max_memory_store / --max_file_store are config-file only, not CLI flags.
    # Store limits are set at runtime by nats-server based on available resources.
    command:
      - "-js"
      - "-m"
      - "8222"
      - "--store_dir=/data"
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring dashboard
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  # system-design.md §6.4: file uploads, generated documents, media recordings,
  # audit artifacts (WORM), backups, temporary processing.
  # Healthcheck uses the MinIO health REST endpoint — mc binary is NOT available
  # in minio/minio image (it lives only in minio/mc image).
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: coescd-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: coescd
      MINIO_ROOT_PASSWORD: coescd_dev
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Initializes MinIO buckets to match the bucket structure in system-design §6.4
  minio-init:
    image: minio/mc:latest
    container_name: coescd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    # Use | (literal block) NOT > (folded) — folding collapses newlines to spaces,
    # which causes shell # comments to silence all commands on the same folded line.
    entrypoint: |
      /bin/sh -c "
        set -e
        mc alias set coescd http://minio:9000 coescd coescd_dev

        # Dev tenant buckets (simulate a single dev tenant)
        mc mb --ignore-existing coescd/coescd-dev-files
        mc mb --ignore-existing coescd/coescd-dev-documents
        mc mb --ignore-existing coescd/coescd-dev-media

        # Cross-tenant shared buckets
        mc mb --ignore-existing coescd/coescd-audit
        mc mb --ignore-existing coescd/coescd-backups
        mc mb --ignore-existing coescd/coescd-temp

        # coescd-audit uses Object Lock in prod (WORM).
        # In dev, set a 24h expiry lifecycle on coescd-temp.
        # mc ilm rule add (mc >= RELEASE.2023-01): replaces the old mc ilm add.
        mc ilm rule add --expiry-days 1 coescd/coescd-temp

        echo 'MinIO buckets ready.'
      "

  # ── ClamAV 1.4 — virus scanner ───────────────────────────────────────────────
  # system-design.md §6.4: "Every uploaded file is scanned by ClamAV before being
  # made available." Files are uploaded to quarantine prefix, scanned by a worker
  # via clamd TCP socket, then moved to final prefix on clean result.
  # Clamd listens on port 3310. Workers connect via CLAMAV_HOST=localhost:3310.
  # WARNING: First start downloads ~350MB of virus definitions. Allow 2-3 min.
  clamav:
    image: clamav/clamav:1.4
    container_name: coescd-clamav
    restart: unless-stopped
    ports:
      - "3310:3310"   # clamd TCP socket (workers connect here)
    volumes:
      - clamav_data:/var/lib/clamav   # virus definition database cache
    environment:
      - CLAMAV_NO_FRESHCLAMD_PROXY=true
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --no-summary /dev/null"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s   # freshclam downloads ~350MB on first start

  # ── OpenSearch 2.17 ──────────────────────────────────────────────────────────
  # system-design.md §6.5: indexes — incidents, messages, documents, audit-*.
  # Graceful degradation: if OpenSearch goes down, search falls back to pg_trgm.
  # ILM managed by the application; single-node for local dev.
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: coescd-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 10
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: coescd-opensearch-dashboards
    restart: unless-stopped
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # ── Mailpit (dev SMTP catcher) ───────────────────────────────────────────────
  # Catches all outbound SMTP from notification workers. View emails at :8025.
  # Set SMTP_HOST=localhost SMTP_PORT=1025 in .env.
  mailpit:
    image: axllent/mailpit:v1.22
    container_name: coescd-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_MAX_MESSAGES: 1000

  # ════════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY PROFILE  (opt-in)
  # system-design.md §9: Prometheus metrics, Grafana dashboards, Jaeger tracing.
  # Start with: docker compose ... --profile observability up -d
  # ════════════════════════════════════════════════════════════════════════════

  # ── Prometheus 2.53 ──────────────────────────────────────────────────────────
  # Scrapes /metrics from all app services via host.docker.internal.
  # App services must expose prom-client metrics at their respective ports.
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: coescd-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana 11.1 ─────────────────────────────────────────────────────────────
  # Dashboards: Platform Overview, Per-Module Detail, Infrastructure, Security.
  # Default credentials: admin / coescd_dev
  grafana:
    image: grafana/grafana:11.1.5
    container_name: coescd-grafana
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3100:3000"   # 3000 is reserved for Next.js
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=coescd_dev
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3100
      - GF_AUTH_ANONYMOUS_ENABLED=false

  # ── Jaeger 1.57 (all-in-one) ─────────────────────────────────────────────────
  # system-design.md §9.3: OTLPTraceExporter sends traces to OTLP gRPC endpoint.
  # Set OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 in .env.
  # Traces are stored in-memory in dev (no persistence between restarts).
  # UI: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: coescd-jaeger
    profiles: ["observability"]
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC model.proto
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  minio_data:
    driver: local
  os_data:
    driver: local
  clamav_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Service endpoints (local) ────────────────────────────────────────────────
# Service                  Port       Notes
# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL (direct)      5432       Admin/DBeaver use only
# PgBouncer (app pool)     6432       All apps connect here — transaction mode
# Redis                    6379       No auth in dev
# NATS client              4222       JetStream enabled
# NATS monitor             8222       HTTP monitoring dashboard
# MinIO S3 API             9000       User: coescd / coescd_dev
# MinIO Console            9001       Browser management UI
# ClamAV clamd             3310       TCP socket — workers connect for AV scan
# OpenSearch               9200       Security disabled in dev
# OpenSearch Dashboards    5601       Query explorer / index management
# Mailpit SMTP             1025       Catches all outbound email
# Mailpit Web UI           8025       View captured emails
# ── Observability profile ──────────────────────────────────────────────────
# Prometheus               9090       Metrics scraper
# Grafana                  3100       Dashboards  (admin / coescd_dev)
# Jaeger UI                16686      Distributed traces
# Jaeger OTLP gRPC         4317       OTEL_EXPORTER_OTLP_ENDPOINT target
# Jaeger OTLP HTTP         4318       Alternative HTTP OTLP endpoint
