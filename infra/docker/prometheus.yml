# Prometheus scrape configuration for local CoESCD development.
# App services run on the host via `pnpm run dev`.
# Infrastructure services and exporters run inside Docker.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: development

scrape_configs:
  - job_name: coescd-api
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics

  - job_name: coescd-realtime
    static_configs:
      - targets: ["host.docker.internal:3002"]
    metrics_path: /metrics

  - job_name: coescd-workers
    static_configs:
      - targets: ["host.docker.internal:3004"]
    metrics_path: /metrics

  - job_name: coescd-sfu
    static_configs:
      - targets: ["host.docker.internal:3003"]
    metrics_path: /metrics

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
