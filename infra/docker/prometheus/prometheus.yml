global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    stack: coescd

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:3001"]
    metrics_path: /metrics

  - job_name: frontend
    static_configs:
      - targets: ["frontend:3000"]
    metrics_path: /api/health

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: nginx
    static_configs:
      - targets: ["nginx:80"]
    metrics_path: /healthz

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
